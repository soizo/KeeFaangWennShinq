<!DOCTYPE html>
<html lang="en-GB">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<title>Kee Faang Wenn Shinq?</title>
	<link rel="icon" type="image/png" href="icon.png">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="KeeFaang">
	<meta name="mobile-web-app-capable" content="yes">
	<link rel="manifest" href="manifest.json">
	<style>
		/* === RESET & BASE === */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: "Times New Roman", "Times", serif;
			background-color: #f0f0f0;
			color: #333;
			line-height: 1.5;
			padding: 12px;
		}

		/* === WEB 1.0 CONTAINER === */
		.container {
			max-width: 640px;
			margin: 0 auto;
			background: #fff;
			border: 1px solid #000;
			padding: 8px;
		}

		/* === HEADER === */
		h1 {
			text-align: center;
			border-bottom: 3px double #000;
		}

		.subtitle {
			color: #000;
		}

		/* === CONTROLS === */
		.controls {
			margin-bottom: 8px;
			padding: 4px;
			border: 1px dashed #000;
			background: #fafafa;
			
		}

		.controls button {
			font-family: inherit;
			padding: 4px 12px;
			cursor: pointer;
			background: #c0c0c0;
			border: 2px outset #c0c0c0;
			color: #000;
		}

		.controls button:active {
			border-style: inset;
		}

		.controls button.active {
			background: #00ff;
			color: #fff;
			border-color: #000080;
		}

		/* === TABLE === */
		table {
			width: 100%;
			border-collapse: collapse;
			margin-bottom: 12px;
			table-layout: fixed;
		}

		th,
		td {
			border: 1px solid #000;
			padding: 2px 4px;
			text-align: left;
			font-size: 15px;
			width: 50%;
		}

		th {
			background: #000;
			color: #fff;
		}

		/* Status cells */
		.site-favicon {
			width: 16px;
			height: 16px;
			vertical-align: middle;
			margin-right: 6px;
			image-rendering: linear;
		}

		.status-ok {
			color: #008000;
			font-weight: bold;
		}

		.status-blocked {
			color: #800000;
			font-weight: bold;
		}

		.status-checking {
			color: #c0c0c0;
			font-style: italic;
		}

		.site-unreachable a {
			color: #c0c0c0;
			font-style: italic;
		}

		/* === VERDICT === */
		.verdict {
			text-align: center;
			padding: 0px;
			margin-bottom: 8px;
			border: 1px solid #000;
			font-weight: bold;
		}

		.verdict-free {
			background: #00ff00;
			color: #000;
		}

		.verdict-partial {
			background: #ffff80;
			color: #000;
		}

		.verdict-blocked {
			background: #ff8080;
			color: #000;
		}

		.verdict-checking {
			background: #c0c0c0;
			color: #000;
		}

		/* === FOOTER === */
		footer {
			font-size: 10px;
			color: #c0c0c0;
			border-top: 1px solid #c0c0c0;
			padding-top: 8px;
		}

		/* === VISITOR COUNTER (WEB 1.0 AESTHETIC) === */
		.counter {
			font-size: 10px;
			color: #c0c0c0;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1><img src="icon.png" alt="" style="width:1em;height:1em;vertical-align:middle;margin-right:10px;image-rendering:auto;">Kee Faang Wenn Shinq?</h1>
		<a href="#" class="subtitle" onclick="location.reload(); return false;">
			Click to check your internet access
		</a>

		<div class="controls">
			<strong>Timeout:</strong>
			<button id="btn-3s" class="active" onclick="runCheck(3000)">3 seconds</button>
			<button id="btn-5s" onclick="runCheck(5000)">5 seconds</button>
			<br>
		</div>

		<div id="verdict" class="verdict verdict-checking">Checking&hellip;</div>

		<table>
			<thead>
				<tr>
					<th>Site</th>
					<th>Status</th>
				</tr>
			</thead>
			<tbody id="results">
				<!-- filled by JS -->
			</tbody>
		</table>

		<footer>
			<p>No data collected. Runs entirely in your browser.</p>
		</footer>

		<div class="counter">
			&#9733; You are visitor No. <span id="visitor-num"></span> today &#9733;
		</div>
	</div>

	<script>
		// --- Site definitions ---
		var sites = [
			// 搜索引擎
			{ name: "Google", url: "https://www.google.com/favicon.ico", href: "https://www.google.com" },
			{ name: "Google HK", url: "https://www.google.com.hk/favicon.ico", href: "https://www.google.com.hk" },
			{ name: "Wikipedia", url: "https://en.wikipedia.org/static/favicon/wikipedia.ico", href: "https://www.wikipedia.org" },

			// AI 助手与翻译
			{ name: "Gemini", url: "https://gemini.google.com/favicon.ico", href: "https://gemini.google.com" },
			{ name: "ChatGPT", url: "https://chatgpt.com/favicon.ico", href: "https://chatgpt.com" },
			{ name: "Claude", url: "https://claude.ai/favicon.ico", href: "https://claude.ai" },
			{ name: "DeepL", url: "https://www.deepl.com/favicon.ico", href: "https://www.deepl.com" },

			// 社交与通讯
			{ name: "Discord", url: "https://discord.com/favicon.ico", href: "https://discord.com" },
			{ name: "Telegram", url: "https://telegram.org/favicon.ico", href: "https://telegram.org" },
			{ name: "Twitter", url: "https://x.com/favicon.ico", href: "https://x.com" },
			{ name: "Reddit", url: "https://www.reddit.com/favicon.ico", href: "https://www.reddit.com" },
			{ name: "Instagram", url: "https://www.instagram.com/favicon.ico", href: "https://www.instagram.com" },

			// 知识与资源
			{ name: "Quora", url: "https://quora.com/favicon.ico", href: "https://quora.com" },
			{ name: "GitHub", url: "https://github.com/favicon.ico", href: "https://github.com" },
			{ name: "Homebrew", url: "https://brew.sh/assets/img/favicon.ico", href: "https://brew.sh" },

			// 媒体与生活
			{ name: "YouTube", url: "https://www.youtube.com/favicon.ico", href: "https://www.youtube.com" },
			{ name: "Netflix", url: "https://www.netflix.com/favicon.ico", href: "https://www.netflix.com" },
			{ name: "TikTok", url: "https://www.tiktok.com/favicon.ico", href: "https://www.tiktok.com" },
			{ name: "Pinterest", url: "https://www.pinterest.com/favicon.ico", href: "https://www.pinterest.com" },
			{ name: "Gmail", url: "https://mail.google.com/favicon.ico", href: "https://mail.google.com" }
		];

		// --- Cache-busting probe ---
		function probe(faviconUrl, timeout) {
			return new Promise(function (resolve) {
				var img = new Image();
				var done = false;

				var timer = setTimeout(function () {
					if (!done) {
						done = true;
						img.onload = null;
						img.onerror = null;
						img.src = "";
						resolve("blocked");
					}
				}, timeout);

				img.onload = function () {
					if (!done) {
						done = true;
						clearTimeout(timer);
						resolve("ok");
					}
				};

				img.onerror = function () {
					if (!done) {
						done = true;
						clearTimeout(timer);
						resolve("blocked");
					}
				};

				// Cache-busting: unique param per probe per run
				// Using multiple strategies to defeat all browser/device caches:
				// 1. Random query param
				// 2. Timestamp
				// 3. Fragment identifier (some browsers key on full URL including fragment)
				var bustParam = "_nc=" + Date.now() + "-" + Math.random().toString(36).slice(2);
				var separator = faviconUrl.indexOf("?") === -1 ? "?" : "&";
				img.src = faviconUrl + separator + bustParam + "#" + Math.random().toString(36).slice(2);
			});
		}

		// --- Render table ---
		function renderTable() {
			var tbody = document.getElementById("results");
			tbody.innerHTML = "";
			for (var i = 0; i < sites.length; i++) {
				var tr = document.createElement("tr");
				tr.id = "site-row-" + i;
				var tdName = document.createElement("td");
				var tdStatus = document.createElement("td");
				var faviconImg = document.createElement("img");
				faviconImg.alt = "";
				faviconImg.className = "site-favicon";
				faviconImg.src = "broken.png";
				(function(el, url) {
					var loader = new Image();
					loader.onload = function() { el.src = url; };
					loader.onerror = function() { /* keep broken.png */ };
					loader.src = url;
				})(faviconImg, sites[i].url);
				var link = document.createElement("a");
				link.href = sites[i].href;
				link.target = "_blank";
				link.rel = "noopener noreferrer";
				link.textContent = sites[i].name;
				tdName.appendChild(faviconImg);
				tdName.appendChild(link);
				tdStatus.textContent = "Checking…";
				tdStatus.className = "status-checking";
				tdStatus.id = "status-" + i;
				tr.appendChild(tdName);
				tr.appendChild(tdStatus);
				tbody.appendChild(tr);
			}
		}

		// --- Run all probes ---
		function runCheck(timeout) {
			// Update button state
			document.getElementById("btn-3s").className = (timeout === 3000) ? "active" : "";
			document.getElementById("btn-5s").className = (timeout === 5000) ? "active" : "";

			// Reset
			renderTable();
			var verdictEl = document.getElementById("verdict");
			verdictEl.textContent = "Checking…";
			verdictEl.className = "verdict verdict-checking";

			var okCount = 0;
			var doneCount = 0;
			var total = sites.length;

			for (var i = 0; i < total; i++) {
				(function (index) {
					probe(sites[index].url, timeout).then(function (result) {
						var cell = document.getElementById("status-" + index);
						var row = document.getElementById("site-row-" + index);
						if (result === "ok") {
							cell.textContent = "✓ Accessible";
							cell.className = "status-ok";
							row.className = "";
							okCount++;
						} else {
							cell.textContent = "✗ Unreachable";
							cell.className = "status-blocked";
							row.className = "site-unreachable";
						}

						doneCount++;
						if (doneCount === total) {
							updateVerdict(okCount, total);
						}
					});
				})(i);
			}
		}

		// --- Verdict ---
		function updateVerdict(ok, total) {
			var el = document.getElementById("verdict");
			if (ok === total) {
				el.textContent = "✓ You appear to have unrestricted internet access.";
				el.className = "verdict verdict-free";
			} else if (ok === 0) {
				el.textContent = "✗ Your network appears to be heavily restricted.";
				el.className = "verdict verdict-blocked";
			} else {
				el.textContent = "⚠ Partial access: " + ok + " of " + total + " sites reachable.";
				el.className = "verdict verdict-partial";
			}
		}

		// --- Fake visitor counter (web 1.0 charm) ---
		document.getElementById("visitor-num").textContent = Math.floor(Math.random() * 9000) + 1000;

		// --- Auto-run with 3s timeout on load ---
		renderTable();
		runCheck(3000);
	</script>
</body>

</html>
